<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="./global.css">
        <link rel="stylesheet" href="./organismRow.css">
        <link rel="stylesheet" href="./foodChainRow.css">
        <script type="module" src="./global.js"></script>
        <script type="module" src="./organismRow.js"></script>
        <script type="module" src="./foodchainRow.js"></script>
    </head>
<body>
    <template id="tempGasm">
        <div class="organBox">
            <section class="organism">
                <div class = "nameBox">
                    <input type="text" name="organismName" class="name" placeholder="Organism:" required>
                    <button class="removeOrganism" type="button">
                        <div class="minusOrganism"></div>
                    </button>
                </div>
            </section>
            <button class="addFood" type="button">
                <div class="plusFood"></div>
            </button>
        </div>
    </template>

    <template id="tempFood">
        <div class="foodItem">
            <input type="text" list="consumableList" name="foodName" class="foodName" placeholder="Eats:">
            <button class="removeFood" type="button">
                <div class="minusFood"></div>
            </button>
        </div>
    </template>

    <section id="organismRow">
        <div id="ecosystemContainer">
            <form id="ecosystem">
                <datalist id = "consumableList">
                </datalist>
            </form>
        </div>
        <div id="organismButtons">
            <button id="addOrganism" type="button" disabled>
                <label>Add <br> Organism</label>
                <div id="plusOrganism"></div>
            </button>
            <button type="submit" id="submit" form="ecosystem" disabled>Save Ecosystem</button>
        </div>
    </section>
    <section id="foodChainRow">
        <div id="foodChainControllers">
            <form id="filters">
                <label for="maxLength">Maximum length:</label>
                <input type="number" name="maxLength" id="maxLength" class="numberFilter">
                <label for="minLength">Minimum length:</label>
                <input type="number" name="minLength" id="minLength" class="numberFilter">
                <label for="producer">Food chains must start with:</label>
                <input type="text" name="producer" id="producer" class="organismFilter" list="consumableList">
                <label for="apex">Food chains must end with:</label>
                <input type="text" name="apex" id="apex" class="organismFilter" list="consumableList">
                <label for="contains">Food chains must contain:</label>
                <input type="text" name="contains" id="contains" class="organismFilter" list="consumableList">
            </form>
            <button type="submit" form="filters" id="displayFoodChains" disabled>Display Food Chains</button>
        </div>
        <div id="foodChainContainer">
            <div id="foodChainDisplay">

            </div>
        </div>
    </section>
</body>
</html>
